# Variant Consistency Pipeline Configuration

# 1. Global Reference Data
vcf: "/path/to/reference.vcf.gz"
donors: "/path/to/donors.txt"

# 2. Sample Mapping
# Define each unique Sample ID and its specific file paths
samples:
  "Sample_01":
    bam: "/path/to/sample_01_possorted.bam"
    barcodes: "/path/to/sample_01/barcodes.tsv.gz"
  "Sample_02":
    bam: "/different/path/sample_02.bam"
    barcodes: "/different/path/sample_02_barcodes.tsv"

# 3. Analysis Parameters
# Minimum depth filters for Step 03 reports
coverage_thresholds: [0, 10, 20]

# Base directory where 00_cellsnp, 01_counts, etc. will be created
out_root: "var-con_pipeline"
